<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工作坊人脸识别考勤系统（云端共享版）</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        html, body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
        }

        #video-box {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0.12);
            background: #000;
        }

        #face-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #camera-video {
            width: 100%;
            height: auto;
            display: block;
        }

        .scroll-wrap {
            max-height: 220px;
            overflow-y: auto;
        }

        .tag-normal { color: #059669; font-weight: 600; }
        .tag-late { color: #d97706; font-weight: 600; }
        .tag-absent { color: #dc2626; font-weight: 600; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-blue { background: #3b82f6; color: white; }
        .btn-blue:hover:not(:disabled) { background: #2563eb; }
        .btn-gray { background: #9ca3af; color: white; }
        .btn-gray:hover:not(:disabled) { background: #6b7280; }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover:not(:disabled) { background: #059669; }
        .btn-orange { background: #f97316; color: white; }
        .btn-orange:hover:not(:disabled) { background: #ea580c; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-purple:hover:not(:disabled) { background: #7c3aed; }
        .btn-red { background: #ef4444; color: white; }
        .btn-red:hover:not(:disabled) { background: #dc2626; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0.06);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .loading-anim {
            animation: pulse 1.5s infinite;
        }

        #preview-canvas {
            display: none;
            border-radius: 8px;
            margin-top: 8px;
            border: 2px solid #10b981;
        }
    </style>
</head>
<body class="p-3 md:p-6">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-600">AI工作坊人脸识别考勤签到系统（云端共享）</h1>
            <p class="text-gray-500 mt-2 text-sm">周一至周五7:15前签到为正常 | 周六8:30前签到为正常 | 周日休息不签到 | 超时记迟到 | 未签到记缺勤</p>
            <p class="text-green-500 text-sm mt-1">云端数据，所有人打开页面同步查看全部签到记录</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
            <!-- 左列：摄像头 -->
            <div class="card">
                <div class="card-title">
                    <span class="w-2.5 h-2.5 bg-green-500 rounded-full inline-block"></span>
                    实时人脸采集
                </div>
                <div id="video-box">
                    <video id="camera-video" autoplay muted playsinline></video>
                    <canvas id="face-canvas"></canvas>
                </div>
                <canvas id="preview-canvas" width="200" height="200"></canvas>

                <div class="flex gap-3 mt-4">
                    <div class="flex flex-col gap-2 flex-1">
                        <button id="start-camera" class="btn btn-blue w-full" disabled>开启摄像头</button>
                        <button id="check-in" class="btn btn-orange w-full" disabled>今日签到（点击后开始识别人脸）</button>
                        <button id="stop-camera" class="btn btn-gray w-full" disabled>关闭摄像头</button>
                    </div>
                    <div class="flex flex-col gap-2 w-36">
                        <button id="register-face" class="btn btn-green w-full" disabled>录入学生人脸</button>
                        <button id="calc-absent" class="btn btn-red w-full" disabled>统计今日缺勤</button>
                    </div>
                </div>

                <p id="status-tip" class="mt-3 text-sm text-gray-500 loading-anim">正在加载AI模型...</p>

                <div class="mt-3 hidden" id="input-wrap">
                    <label class="block text-sm text-gray-600 mb-1 font-medium">输入学生姓名：</label>
                    <div class="flex gap-2">
                        <input type="text" id="student-name" placeholder="请输入姓名"
                               class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm outline-blue-500 focus:border-blue-500">
                        <button id="confirm-register" class="btn btn-green" style="padding:8px 16px;">确认录入</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">请正对摄像头，光线充足，保持表情自然</p>
                </div>
            </div>

            <!-- 中列：人脸库 + 签到记录 -->
            <div class="flex flex-col gap-5">
                <div class="card">
                    <div class="card-title">
                        <span>云端学生人脸库</span>
                        <span id="student-count" class="text-sm text-gray-400 font-normal ml-1">(0/20)</span>
                        <button id="clear-student" class="text-xs text-red-400 hover:text-red-600 ml-auto">清空全部</button>
                    </div>
                    <div id="student-list" class="scroll-wrap text-sm text-gray-500">加载云端人脸中...</div>
                </div>

                <div class="card flex-1">
                    <div class="card-title">
                        <span>今日云端签到记录</span>
                        <button id="clear-today-record" class="text-xs text-red-400 hover:text-red-600 ml-auto">清空今日记录</button>
                    </div>
                    <div id="today-record" class="scroll-wrap text-sm">同步云端数据...</div>
                </div>
            </div>

            <!-- 右列：缺勤 + 工作坊设置 + 月度 -->
            <div class="flex flex-col gap-5">
                <div class="card">
                    <div class="card-title">今日缺勤名单</div>
                    <div id="absent-list" class="scroll-wrap text-sm tag-absent">点击【统计今日缺勤】生成名单</div>
                </div>

                <div class="card">
                    <div class="card-title">工作坊签到范围</div>
                    <div id="workshop-info" class="text-sm text-gray-500 leading-6">加载配置中...</div>
                    <div class="grid grid-cols-1 gap-2 mt-3">
                        <button id="register-admin-face" class="btn btn-purple w-full" disabled>录入/更换管理员人脸</button>
                        <button id="update-workshop-location" class="btn btn-blue w-full" disabled>修改签到地点（管理员验证）</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">修改地点前必须通过管理员人脸识别，签到时校验定位。</p>
                </div>

                <div class="card flex-1">
                    <div class="card-title">
                        <span>月度云端考勤总库</span>
                        <select id="month-select" class="border border-gray-300 px-2 py-1 text-sm rounded ml-auto"></select>
                    </div>
                    <div id="month-record" class="scroll-wrap text-sm">加载月度数据...</div>
                    <button id="clear-month-data"
                            class="w-full mt-3 py-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 text-sm font-medium transition">
                        清空当前月份全部考勤
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
// ===================== 已填好你的Supabase信息，无需修改 =====================
const SUPABASE_URL = "https://aldubipgjeqevqwspblm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tm-k2icbPkF2A2tSfPCiWA_pe8MWMjT";
// ======================================================================

// 初始化云端数据库
const { createClient } = supabase;
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 全局常量
const MAX_STUDENT = 20;
const SIGN_RULES = {
    weekday: { hour: 7, minute: 15, label: '周一至周五7:15' },
    saturday: { hour: 8, minute: 30, label: '周六8:30' }
};
const FACE_THRESHOLD = 0.45;
const ADMIN_FACE_THRESHOLD = 0.5;
const DEFAULT_WORKSHOP_RADIUS = 100;
const MODEL_URLS = [
    "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights",
    "https://justadudewhohacks.github.io/face-api.js/models"
];
let currentModelUrl = null;

// DOM缓存
const videoDom = document.getElementById('camera-video');
const canvasDom = document.getElementById('face-canvas');
const ctx = canvasDom.getContext('2d');
const previewCanvas = document.getElementById('preview-canvas');
const previewCtx = previewCanvas.getContext('2d');
const statusTip = document.getElementById('status-tip');
const studentCountDom = document.getElementById('student-count');
const workshopInfoDom = document.getElementById('workshop-info');

const btnStartCamera = document.getElementById('start-camera');
const btnStopCamera = document.getElementById('stop-camera');
const btnRegister = document.getElementById('register-face');
const btnCheckIn = document.getElementById('check-in');
const btnCalcAbsent = document.getElementById('calc-absent');
const btnClearStudent = document.getElementById('clear-student');
const btnClearToday = document.getElementById('clear-today-record');
const btnClearMonth = document.getElementById('clear-month-data');
const btnConfirmRegister = document.getElementById('confirm-register');
const btnRegisterAdmin = document.getElementById('register-admin-face');
const btnUpdateWorkshop = document.getElementById('update-workshop-location');

const inputWrap = document.getElementById('input-wrap');
const studentNameInput = document.getElementById('student-name');
const studentListDom = document.getElementById('student-list');
const todayRecordDom = document.getElementById('today-record');
const absentListDom = document.getElementById('absent-list');
const monthRecordDom = document.getElementById('month-record');
const monthSelectDom = document.getElementById('month-select');

// 全局状态
let modelLoaded = false;
let mediaStream = null;
let detectTimer = null;
let pendingRegistration = false;
let localStudentList = [];
let localAdminFace = null;
let localWorkshopCfg = null;

window.onload = async () => {
    await loadFaceModel();
    await loadAllCloudData();
};
window.onbeforeunload = () => closeCamera();

// 加载全部云端数据
async function loadAllCloudData() {
    statusTip.innerText = "同步云端人脸、考勤配置...";
    // 1. 读取学生人脸
    const { data: stuData } = await supabase.from("student_face").select("*").order("registered_at");
    localStudentList = stuData || [];
    renderStudentList();

    // 2. 读取管理员人脸
    const { data: adminData } = await supabase.from("admin_face").select("*").limit(1);
    localAdminFace = adminData?.[0] || null;
    // 3. 读取签到地点
    const { data: cfgData } = await supabase.from("workshop_config").select("*").eq("id",1).limit(1);
    localWorkshopCfg = cfgData?.[0] || null;

    renderWorkshopInfo();
    await refreshMonthSelect();
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,0)}`;
    renderTodayRecord(todayStr);
    statusTip.innerText = "云端数据同步完成";
}

// 学生人脸渲染
function renderStudentList() {
    const total = localStudentList.length;
    studentCountDom.innerText = `(${total}/${MAX_STUDENT})`;
    if (total === 0) {
        studentListDom.innerHTML = '<span class="text-gray-400">云端暂无录入学生</span>';
        return;
    }
    let html = '';
    localStudentList.forEach((item, idx) => {
        html += `
            <div class="py-1.5 border-b border-gray-100 flex justify-between items-center">
                <span>${idx + 1}. ${item.name}</span>
                <button data-id="${item.id}" class="text-red-400 hover:text-red-600 del-stu text-xs">删除</button>
            </div>
        `;
    });
    studentListDom.innerHTML = html;
    document.querySelectorAll('.del-stu').forEach(el => {
        el.onclick = async () => {
            const delId = el.dataset.id;
            await supabase.from("student_face").delete().eq("id", delId);
            await loadAllCloudData();
        };
    });
}

// 加载月份下拉
async function refreshMonthSelect() {
    const { data: attData } = await supabase.from("attendance").select("month_key");
    const monthSet = new Set();
    attData.forEach(item => monthSet.add(item.month_key));
    const months = Array.from(monthSet).sort().reverse();
    monthSelectDom.innerHTML = '';
    if (months.length === 0) {
        monthSelectDom.innerHTML = '<option value="">暂无考勤数据</option>';
        monthRecordDom.innerHTML = '<span class="text-gray-400">暂无月度考勤</span>';
        return;
    }
    months.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.innerText = m;
        monthSelectDom.appendChild(opt);
    });
    monthSelectDom.value = months[0];
    renderMonthRecord(months[0]);
}
monthSelectDom.onchange = () => renderMonthRecord(monthSelectDom.value);

async function renderMonthRecord(month) {
    const { data: list } = await supabase.from("attendance").eq("month_key", month).order("sign_time", {asc:false});
    if (!list || list.length === 0) {
        monthRecordDom.innerHTML = '<span class="text-gray-400">该月无考勤记录</span>';
        return;
    }
    let html = '';
    list.forEach(item => {
        const tagMap = {normal: ['tag-normal', '正常'], late: ['tag-late', '迟到'], absent: ['tag-absent', '缺勤']};
        const [cls, txt] = tagMap[item.status];
        html += `
            <div class="py-2 border-b border-gray-100">
                <div class="font-medium">${item.name}</div>
                <div class="${cls}">${txt}</div>
                <div class="text-xs text-gray-400">日期：${item.date} | ${item.sign_time || '无签到时间'}</div>
            </div>
        `;
    });
    monthRecordDom.innerHTML = html;
}

// 签到地点渲染
function renderWorkshopInfo() {
    const adminText = localAdminFace ? '已录入管理员人脸' : '未录入管理员人脸';
    if (!localWorkshopCfg) {
        workshopInfoDom.innerHTML = `
            <div>管理员：${adminText}</div>
            <div>签到地点：云端未设置</div>
        `;
        return;
    }
    workshopInfoDom.innerHTML = `
        <div>管理员：${adminText}</div>
        <div>地点：${localWorkshopCfg.name}</div>
        <div>有效范围：${localWorkshopCfg.radius}米</div>
        <div class="text-xs">经纬度：${localWorkshopCfg.lat.toFixed(6)}, ${localWorkshopCfg.lng.toFixed(6)}</div>
    `;
}

// 时间规则
function getTodaySignRule(now = new Date()) {
    const weekDay = now.getDay();
    if (weekDay === 0) return null;
    if (weekDay === 6) return SIGN_RULES.saturday;
    return SIGN_RULES.weekday;
}
function isLateByRule(now, rule) {
    const h = now.getHours(), m = now.getMinutes();
    return h > rule.hour || (h === rule.hour && m > rule.minute);
}

// 人脸模型加载
async function loadFaceModel() {
    let dotCount = 0;
    const dotTimer = setInterval(() => {
        statusTip.innerText = `AI模型加载${'.'.repeat(dotCount||1)}`;
        dotCount = (dotCount + 1) % 4;
    },600);
    for(const url of MODEL_URLS) {
        try {
            currentModelUrl = url;
            await faceapi.nets.ssdMobilenetv1.loadFromUri(url);
            await faceapi.nets.faceLandmark68Net.loadFromUri(url);
            await faceapi.nets.faceRecognitionNet.loadFromUri(url);
            clearInterval(dotTimer);
            modelLoaded = true;
            btnStartCamera.disabled = false;
            btnRegister.disabled = false;
            btnCheckIn.disabled = false;
            btnCalcAbsent.disabled = false;
            btnRegisterAdmin.disabled = false;
            btnUpdateWorkshop.disabled = false;
            statusTip.innerText = "✅ AI模型就绪，同步云端数据中";
            statusTip.classList.remove("loading-anim");
            return;
        }catch(e){}
    }
    clearInterval(dotTimer);
    statusTip.innerText = "❌ AI模型加载失败，刷新页面";
    statusTip.style.color = "#dc2626";
}

// 摄像头控制
async function openCamera() {
    if(!modelLoaded) return alert("AI模型未加载完成");
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}, audio:false});
        videoDom.srcObject = mediaStream;
        videoDom.onloadedmetadata = () => {
            canvasDom.width = videoDom.videoWidth;
            canvasDom.height = videoDom.videoHeight;
            startDetectLoop();
        };
        btnStartCamera.disabled = true;
        btnStopCamera.disabled = false;
        statusTip.innerText = "摄像头开启，实时检测人脸";
        statusTip.style.color = "#059669";
    }catch(err){
        statusTip.innerText = "无法获取摄像头权限";
        statusTip.style.color = "#dc2626";
    }
}
function closeCamera() {
    if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());
    mediaStream = null;
    videoDom.srcObject = null;
    if(detectTimer) cancelAnimationFrame(detectTimer);
    detectTimer = null;
    ctx.clearRect(0,0,canvasDom.width,canvasDom.height);
    previewCanvas.style.display = "none";
    pendingRegistration = false;
    btnStartCamera.disabled = false;
    btnStopCamera.disabled = true;
    inputWrap.classList.add("hidden");
    statusTip.innerText = "摄像头已关闭";
    statusTip.style.color = "#666";
}

function selectBestFace(faces) {
    const frameArea = videoDom.videoWidth * videoDom.videoHeight;
    const valid = faces.filter(f => f.detection.box.width * f.detection.box.height > frameArea * 0.05);
    if(!valid.length) return null;
    valid.sort((a,b)=>{
        const sa = a.detection.box.width * a.detection.box.height;
        const sb = b.detection.box.width * b.detection.box.height;
        return sb - sa;
    });
    return valid[0];
}

function startDetectLoop() {
    async function detect(){
        if(!mediaStream) return;
        const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({minConfidence:0.7}))
            .withFaceLandmarks().withFaceDescriptors();
        ctx.clearRect(0,0,canvasDom.width,canvasDom.height);
        const size = {width:canvasDom.width, height:canvasDom.height};
        const resize = faceapi.resizeResults(faces, size);
        faceapi.draw.drawDetections(canvasDom, resize);
        faceapi.draw.drawFaceLandmarks(canvasDom, resize);
        if(resize.length > 0) {
            const best = selectBestFace(resize);
            if(best) {
                const box = best.detection.box;
                ctx.strokeStyle="#0f0"; ctx.lineWidth=3;
                ctx.strokeRect(box.x,box.y,box.width,box.height);
            }
            if(pendingRegistration && best) showFacePreview(best);
        }
        detectTimer = requestAnimationFrame(detect);
    }
    detect();
}
function showFacePreview(detection) {
    const box = detection.detection.box;
    const scale = 200 / Math.max(box.width, box.height);
    previewCanvas.width = 200; previewCanvas.height=200;
    previewCtx.fillRect(0,0,200,200);
    previewCtx.drawImage(videoDom, box.x, box.y, box.width, box.height,
        (200-box.width*scale)/2, (200-box.height*scale)/2, box.width*scale, box.height*scale);
    previewCanvas.style.display = "block";
}

// 录入学生人脸
btnRegister.onclick = () => {
    if(!mediaStream) return alert("请先打开摄像头");
    pendingRegistration = true;
    inputWrap.classList.remove("hidden");
    studentNameInput.value = "";
    studentNameInput.focus();
    statusTip.innerText = "输入姓名，正对人脸确认录入";
    statusTip.style.color = "#2563eb";
};
studentNameInput.onkeydown = e=>e.key==="Enter" && doRegister();
btnConfirmRegister.onclick = doRegister;

async function doRegister() {
    const name = studentNameInput.value.trim();
    if(!name) return alert("填写学生姓名");
    if(localStudentList.length >= MAX_STUDENT) return alert("最多录入20人");
    statusTip.innerText = "采集人脸特征...";
    const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({minConfidence:0.7}))
        .withFaceLandmarks().withFaceDescriptors();
    if(!faces.length) {
        statusTip.innerText = "未检测人脸";
        statusTip.style.color = "#dc2626";
        return;
    }
    const target = selectBestFace(faces);
    if(!target) {
        statusTip.innerText = "人脸过小，请靠近";
        statusTip.style.color = "#dc2626";
        return;
    }
    // 上传云端
    const {error} = await supabase.from("student_face").insert({
        name: name,
        descriptor: Array.from(target.descriptor)
    });
    if(error) {
        alert("录入失败："+error.message);
        return;
    }
    pendingRegistration = false;
    inputWrap.classList.add("hidden");
    previewCanvas.style.display = "none";
    alert(`【${name}】人脸已存入云端，所有人可见`);
    await loadAllCloudData();
}

// 定位工具
function getCurrentPosition() {
    return new Promise((res, rej)=>{
        if(!navigator.geolocation) rej("浏览器不支持定位");
        navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:10000});
    });
}
function calcDistance(lat1,lng1,lat2,lng2) {
    const R = 6371000;
    const rad = d => d * Math.PI / 180;
    const dLat = rad(lat2-lat1);
    const dLng = rad(lng2-lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 管理员人脸验证/录入
async function captureDesc() {
    if(!mediaStream) { alert("打开摄像头"); return null; }
    const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({minConfidence:0.7}))
        .withFaceLandmarks().withFaceDescriptors();
    if(!faces.length) return null;
    return selectBestFace(faces).descriptor;
}
async function verifyAdmin() {
    if(!localAdminFace) {
        alert("未设置管理员人脸"); return false;
    }
    const desc = await captureDesc();
    if(!desc) return false;
    const dist = faceapi.euclideanDistance(desc, new Float32Array(localAdminFace.descriptor));
    if(dist >= ADMIN_FACE_THRESHOLD) {
        alert("管理员验证失败");
        return false;
    }
    return true;
}
btnRegisterAdmin.onclick = async () => {
    if(localAdminFace) {
        const ok = await verifyAdmin();
        if(!ok) return;
        if(!confirm("确认更换管理员人脸？")) return;
    }else if(!confirm("将当前人脸设为云端管理员？")) return;
    const desc = await captureDesc();
    if(!desc) return;
    // 先清空旧管理员
    await supabase.from("admin_face").delete().neq("id",0);
    await supabase.from("admin_face").insert({descriptor: Array.from(desc)});
    alert("管理员人脸上传云端成功");
    await loadAllCloudData();
};
btnUpdateWorkshop.onclick = async () => {
    const ok = await verifyAdmin();
    if(!ok) return;
    try {
        const pos = await getCurrentPosition();
        const name = prompt("签到地点名称", localWorkshopCfg?.name || "工作坊");
        const radius = Number(prompt("有效签到米数", localWorkshopCfg?.radius || DEFAULT_WORKSHOP_RADIUS));
        if(isNaN(radius) || radius <=0) return alert("范围数字无效");
        // 覆盖云端配置
        await supabase.from("workshop_config").upsert({
            id:1,
            name: name,
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            radius: radius
        });
        alert("签到地点已同步到云端");
        await loadAllCloudData();
    }catch(e){
        alert("定位失败："+e);
    }
};

// 签到主逻辑
btnCheckIn.onclick = async function() {
    const today = new Date();
    const rule = getTodaySignRule(today);
    if(!rule) return alert("周日无需签到");
    if(!mediaStream) return alert("开启摄像头");
    // 校验定位
    if(!localWorkshopCfg) return alert("管理员未设置签到区域");
    try {
        const pos = await getCurrentPosition();
        const dis = calcDistance(pos.coords.latitude, pos.coords.longitude, localWorkshopCfg.lat, localWorkshopCfg.lng);
        if(dis > localWorkshopCfg.radius) return alert("超出签到范围，禁止打卡");
    }catch(e){
        return alert("获取定位失败，无法签到");
    }
    // 识别人脸
    const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({minConfidence:0.7}))
        .withFaceLandmarks().withFaceDescriptors();
    if(!faces.length) return alert("未检测人脸");
    const targetFace = selectBestFace(faces);
    if(!targetFace) return alert("人脸过小");
    let match = null;
    let minDist = Infinity;
    for(const stu of localStudentList) {
        const d = faceapi.euclideanDistance(targetFace.descriptor, new Float32Array(stu.descriptor));
        if(d < minDist) { minDist = d; match = stu; }
    }
    if(!match || minDist >= FACE_THRESHOLD) return alert("无匹配学生");
    // 组装签到数据
    const year = today.getFullYear();
    const m = String(today.getMonth()+1).padStart(2);
    const d = String(today.getDate()).padStart(2);
    const dateStr = `${year}-${m}-${d}`;
    const monthKey = `${year}-${m}`;
    let status = isLateByRule(today, rule) ? "late" : "normal";
    // 先删除今日该学生旧签到，再新增
    await supabase.from("attendance")
        .delete()
        .eq("month_key", monthKey)
        .eq("date", dateStr)
        .eq("name", match.name);
    await supabase.from("attendance").insert({
        name: match.name,
        date: dateStr,
        sign_time: today.toISOString(),
        status: status,
        month_key: monthKey
    });
    alert(`${match.name}签到成功，云端同步完成`);
    await refreshMonthSelect();
    renderTodayRecord(dateStr);
};

async function renderTodayRecord(dateStr) {
    const now = new Date();
    const mk = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,0)}`;
    const {data} = await supabase.from("attendance").eq("month_key", mk).eq("date", dateStr);
    if(!data || data.length ===0) {
        todayRecordDom.innerHTML = "<span class='text-gray-400'>今日无签到</span>";
        return;
    }
    todayRecordDom.innerHTML = data.map(item=>`
        <div class="py-1.5 border-b flex justify-between">
            <span>${item.name}</span>
            <span class="${item.status==='normal'?'tag-normal':'tag-late'}">${item.status==='normal'?'正常':'迟到'}</span>
            <span class="text-xs text-gray-400">${new Date(item.sign_time).toLocaleString()}</span>
    `).join("");
}

// 统计缺勤
btnCalcAbsent.onclick = async () => {
    const today = new Date();
    const rule = getTodaySignRule(today);
    if(!rule) return alert("周日无需统计");
    const y = today.getFullYear();
    const m = String(today.getMonth()+1).padStart(2);
    const d = String(today.getDate()).padStart(2);
    const mk = `${y}-${m}`;
    const dateStr = `${y}-${m}-${d}`;
    const {data: signList} = await supabase.from("attendance").eq("month_key", mk).eq("date", dateStr);
    const signNames = signList.map(i=>i.name);
    const absent = localStudentList.filter(s=>!signNames.includes(s.name));
    // 云端写入缺勤记录
    for(const stu of absent) {
        const exist = signList.find(x=>x.name===stu.name);
        if(!exist) {
            await supabase.from("attendance").insert({
                name: stu.name,
                date: dateStr,
                sign_time: null,
                status: "absent",
                month_key: mk
            });
        }
    }
    if(absent.length ===0) {
        absentListDom.innerHTML = '<span class="tag-normal">今日全员到岗</span>';
    }else{
        absentListDom.innerHTML = absent.map(i=>`<div class="py-1 border-b">${i.name}（缺勤）`).join("");
    }
    await refreshMonthSelect();
};

// 清空按钮事件
btnClearStudent.onclick = async () => {
    if(!confirm("删除云端全部学生人脸？不可恢复")) return;
    await supabase.from("student_face").delete().neq("id",0);
    await loadAllCloudData();
};
btnClearToday.onclick = async () => {
    const today = new Date();
    const mk = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,0)}`;
    const ds = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2)}-${String(today.getDate()).padStart(2)}`;
    if(!confirm("清空今日云端签到？")) return;
    await supabase.from("attendance").delete().eq("month_key", mk).eq("date", ds);
    renderTodayRecord(ds);
    absentListDom.innerHTML = "点击统计缺勤";
};
btnClearMonth.onclick = async () => {
    const sel = monthSelectDom.value;
    if(!sel) return;
    if(!confirm(`删除${sel}全部云端考勤？`)) return;
    await supabase.from("attendance").delete().eq("month_key", sel);
    await refreshMonthSelect();
};

// 绑定基础开关
btnStartCamera.onclick = openCamera;
btnStopCamera.onclick = closeCamera;
