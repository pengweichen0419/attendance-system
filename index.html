<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工作坊人脸识别考勤签到系统</title>
    <!-- 外部CDN依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        html,body{
            width:100%;
            min-height:100vh;
            margin:0;
            padding:0;
            background-color:#f0f2f5;
            font-family:-apple-system,"Microsoft YaHei",sans-serif
        }
        #video-box{
            position:relative;
            width:100%;
            max-width:560px;
            margin:0 auto;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 4px 20px rgba(0,0,0,0.12);
            background:#000
        }
        #face-canvas{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%
        }
        #camera-video{
            width:100%;
            height:auto;
            display:block
        }
        .scroll-wrap{
            max-height:220px;
            overflow-y:auto
        }
        .tag-normal{color:#059669;font-weight:600;}
        .tag-late{color:#d97706;font-weight:600;}
        .tag-absent{color:#dc2626;font-weight:600;}
        .btn{
            padding:10px 20px;
            border-radius:8px;
            font-weight:600;
            font-size:14px;
            cursor:pointer;
            border:none;
            transition:all .2s
        }
        .btn:disabled{opacity:.4;cursor:not-allowed}
        .btn-blue{background:#3b82f6;color:#fff;}
        .btn-blue:hover:not(:disabled){background:#2563eb}
        .btn-gray{background:#9ca3af;color:#fff;}
        .btn-gray:hover:not(:disabled){background:#6b7280}
        .btn-green{background:#10b981;color:#fff;}
        .btn-green:hover:not(:disabled){background:#059669}
        .btn-orange{background:#f97316;color:#fff;}
        .btn-orange:hover:not(:disabled){background:#ea580c}
        .btn-purple{background:#8b5cf6;color:#fff;}
        .btn-purple:hover:not(:disabled){background:#7c3aed}
        .btn-red{background:#ef4444;color:#fff;}
        .btn-red:hover:not(:disabled){background:#dc2626}
        .card{
            background:#fff;
            border-radius:12px;
            padding:20px;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
            margin-bottom:16px
        }
        .card-title{
            font-size:16px;
            font-weight:700;
            margin-bottom:12px;
            display:flex;
            align-items:center;
            gap:8px
        }
        @keyframes pulse{
            0%,100%{opacity:1}
            50%{opacity:.4}
        }
        .loading-anim{animation:pulse 1.5s infinite}
        #preview-canvas{
            display:none;
            border-radius:8px;
            margin-top:8px;
            border:2px solid #10b981
        }
        .db-badge{
            display:inline-block;
            padding:3px 10px;
            border-radius:6px;
            font-size:12px;
            font-weight:600
        }
        .db-cloud{background:#d1fae5;color:#065f46}
        .db-local{background:#fee2e2;color:#991b1b}
        .db-syncing{background:#fef3c7;color:#92400e}
        @keyframes spin{
            to{transform:rotate(360deg)}
        }
        .spinner{
            display:inline-block;
            width:12px;
            height:12px;
            border:2px solid #92400e;
            border-top-color:transparent;
            border-radius:50%;
            animation:spin .6s linear infinite;
            vertical-align:middle;
            margin-right:4px
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">AI工作坊人脸识别考勤签到系统</h1>
            <p class="text-sm text-gray-500 mt-1">周一至周五7:15前签到为正常 | 周六8:30前签到为正常 | 周日休息不签到 | 超时记迟到 | 未签到记缺勤</p>
            <div class="mt-2">
                <span class="db-badge db-local" id="db-badge">
                    <span class="spinner"></span>数据库状态：检测中...
                </span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📷 实时人脸采集</div>
            <div id="video-box">
                <video id="camera-video" autoplay muted playsinline></video>
                <canvas id="face-canvas"></canvas>
            </div>
            <canvas id="preview-canvas" width="200" height="200"></canvas>
            <div class="flex flex-wrap gap-2 mt-3 justify-center">
                <button id="start-camera" class="btn btn-blue" disabled>开启摄像头</button>
                <button id="stop-camera" class="btn btn-gray" disabled>关闭摄像头</button>
                <button id="check-in" class="btn btn-green" disabled>今日签到</button>
                <button id="register-face" class="btn btn-blue" disabled>录入学生人脸</button>
                <button id="calc-absent" class="btn btn-orange" disabled>统计今日缺勤</button>
            </div>
            <div id="status-tip" class="text-center mt-2 text-sm loading-anim" style="color:#6b7280;">正在加载AI模型...</div>
        </div>

        <div id="input-wrap" class="card hidden">
            <div class="card-title">⌨️ 录入新学生</div>
            <div class="flex gap-2">
                <input id="student-name" type="text" placeholder="输入学生姓名" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm">
                <button id="confirm-register" class="btn btn-green">确认录入</button>
            </div>
            <p class="text-xs text-gray-400 mt-1">请正对摄像头，光线充足，保持表情自然</p>
        </div>

        <div class="card">
            <div class="card-title">👥 学生人脸库 <span id="student-count" class="text-gray-400 text-sm font-normal">(0/20)</span></div>
            <div id="student-list" class="scroll-wrap text-sm"><span class="text-gray-400">暂无录入学生</span></div>
            <button id="clear-student" class="btn btn-red mt-2 text-xs">清空全部</button>
        </div>

        <div class="card">
            <div class="card-title">✅ 今日签到记录</div>
            <div id="today-record" class="scroll-wrap text-sm"><span class="text-gray-400">暂无签到数据</span></div>
            <button id="clear-today-record" class="btn btn-red mt-2 text-xs">清空今日记录</button>
        </div>

        <div class="card">
            <div class="card-title">⚠️ 今日缺勤名单</div>
            <div id="absent-list" class="scroll-wrap text-sm"><span class="text-gray-400">点击【统计今日缺勤】生成名单</span></div>
        </div>

        <div class="card">
            <div class="card-title">📍 工作坊签到范围</div>
            <div id="workshop-info" class="text-sm text-gray-600">尚未设置签到地点</div>
            <div class="flex gap-2 mt-2 flex-wrap">
                <button id="register-admin-face" class="btn btn-purple text-xs" disabled>录入/更换管理员人脸</button>
                <button id="update-workshop-location" class="btn btn-orange text-xs" disabled>修改签到地点</button>
            </div>
            <p class="text-xs text-gray-400 mt-1">修改地点前必须先通过管理员人脸识别，签到时会校验是否在指定范围内。</p>
        </div>

        <div class="card">
            <div class="card-title">📊 月度考勤总库</div>
            <select id="month-select" class="border border-gray-300 rounded-lg px-3 py-2 text-sm mb-2 w-full"></select>
            <div id="month-record" class="scroll-wrap text-sm"><span class="text-gray-400">暂无月度考勤记录</span></div>
            <button id="clear-month-data" class="btn btn-red mt-2 text-xs">清空当前月份全部考勤</button>
        </div>
    </div>

<script>
// ====================== GitHub 云数据库配置（⭐ 填入你自己的值）======================
const GITHUB_CONFIG = {
    token: "【替换成你刚生成的 GitHub Token】",
    owner: "pengweichen0419",
    repo: "attendance-system",
    path: "data.json",
    branch: "main"
};
// 判断是否启用了云端数据库
const USE_CLOUD_DB = GITHUB_CONFIG.token && GITHUB_CONFIG.token !== "【替换成你刚生成的 GitHub Token】";
// ====================================================================================

const MAX_STUDENT = 20;
const SIGN_RULES = {
    weekday: { hour: 7, minute: 15, label: "周一至周五7:15" },
    saturday: { hour: 8, minute: 30, label: "周六8:30" }
};
const FACE_THRESHOLD = 0.45;
const ADMIN_FACE_THRESHOLD = 0.5;
const DEFAULT_WORKSHOP_RADIUS = 100;
const MODEL_URLS = [
    "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights",
    "https://justadudewhohacks.github.io/face-api.js/models"
];
let currentModelUrl = null;

const videoDom = document.getElementById('camera-video');
const canvasDom = document.getElementById('face-canvas');
const ctx = canvasDom.getContext('2d');
const previewCanvas = document.getElementById('preview-canvas');
const previewCtx = previewCanvas.getContext('2d');
const statusTip = document.getElementById('status-tip');
const studentCountDom = document.getElementById('student-count');
const workshopInfoDom = document.getElementById('workshop-info');
const dbBadge = document.getElementById('db-badge');
const btnStartCamera = document.getElementById('start-camera');
const btnStopCamera = document.getElementById('stop-camera');
const btnRegister = document.getElementById('register-face');
const btnCheckIn = document.getElementById('check-in');
const btnCalcAbsent = document.getElementById('calc-absent');
const btnClearStudent = document.getElementById('clear-student');
const btnClearToday = document.getElementById('clear-today-record');
const btnClearMonth = document.getElementById('clear-month-data');
const btnConfirmRegister = document.getElementById('confirm-register');
const btnRegisterAdmin = document.getElementById('register-admin-face');
const btnUpdateWorkshop = document.getElementById('update-workshop-location');
const inputWrap = document.getElementById('input-wrap');
const studentNameInput = document.getElementById('student-name');
const studentListDom = document.getElementById('student-list');
const todayRecordDom = document.getElementById('today-record');
const absentListDom = document.getElementById('absent-list');
const monthRecordDom = document.getElementById('month-record');
const monthSelectDom = document.getElementById('month-select');

let modelLoaded = false, mediaStream = null, detectTimer = null, pendingRegistration = false;
let studentDB = [], monthAttendanceDB = {}, adminFaceDB = null, workshopLocation = null;

// ====================== DB状态显示 ======================
function setDBBadge(text, cls) {
    dbBadge.innerText = text;
    dbBadge.className = 'db-badge ' + cls;
}

// ====================== GitHub 云数据库读写 ======================
const ghApiBase = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
const ghHeaders = {
    "Authorization": "token " + GITHUB_CONFIG.token,
    "Accept": "application/vnd.github.v3+json",
    "Content-Type": "application/json"
};

async function readFromCloud() {
    try {
        const resp = await fetch(ghApiBase + "?ref=" + GITHUB_CONFIG.branch);
        if (resp.status === 404) return null;
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        const json = JSON.parse(atob(data.content));
        console.log("✅ 从 GitHub 云端加载数据成功");
        return json;
    } catch (err) {
        console.warn("云端加载失败:", err.message);
        return null;
    }
}

async function writeToCloud() {
    setDBBadge("⏳ 同步中...", "db-syncing");
    dbBadge.innerHTML = '<span class="spinner"></span>同步中...';
    try {
        let sha = null;
        try {
            const existResp = await fetch(ghApiBase + "?ref=" + GITHUB_CONFIG.branch);
            if (existResp.ok) {
                const existData = await existResp.json();
                sha = existData.sha;
            }
        } catch (e) { }
        const body = {
            message: "更新签到数据 " + new Date().toLocaleString('zh-CN'),
            content: btoa(unescape(encodeURIComponent(JSON.stringify({
                studentDB: studentDB,
                monthAttendanceDB: monthAttendanceDB,
                adminFaceDB: adminFaceDB,
                workshopLocation: workshopLocation
            }, null, 2)))),
            branch: GITHUB_CONFIG.branch
        };
        if (sha) body.sha = sha;
        const resp = await fetch(ghApiBase, {
            method: "PUT",
            headers: ghHeaders,
            body: JSON.stringify(body)
        });
        if (!resp.ok) {
            const errText = await resp.text();
            throw new Error("HTTP " + resp.status + ": " + errText.substring(0, 100));
        }
        setDBBadge("✅ 数据库：GitHub 云端（已同步）", "db-cloud");
        console.log("✅ 数据已同步到 GitHub");
        return true;
    } catch (err) {
        console.error("同步失败:", err.message);
        setDBBadge("⚠️ 同步失败（数据保存在本地）", "db-syncing");
        return false;
    }
}

// ====================== 数据加载 ======================
async function loadData() {
    if (USE_CLOUD_DB) {
        const cloudData = await readFromCloud();
        if (cloudData) {
            studentDB = cloudData.studentDB || [];
            monthAttendanceDB = cloudData.monthAttendanceDB || {};
            adminFaceDB = cloudData.adminFaceDB || null;
            workshopLocation = cloudData.workshopLocation || null;
            setDBBadge("✅ 数据库：GitHub 云端", "db-cloud");
        } else {
            loadFromLocal();
            setDBBadge("✅ 数据库：GitHub 云端（无历史数据）", "db-cloud");
        }
    } else {
        loadFromLocal();
        setDBBadge("⚠️ 本地模式（未配置GitHub Token）", "db-local");
    }
}

function loadFromLocal() {
    studentDB = JSON.parse(localStorage.getItem('studentFaceDB')) || [];
    monthAttendanceDB = JSON.parse(localStorage.getItem('monthAttendanceDB')) || {};
    adminFaceDB = JSON.parse(localStorage.getItem('adminFaceDB')) || null;
    workshopLocation = JSON.parse(localStorage.getItem('workshopLocation')) || null;
}

// ====================== 数据持久化 ======================
function saveStudentDB() { renderStudentList(); persistAll(); }
function saveMonthDB() { renderMonthSelect(); persistAll(); }
function saveAdminDB() { renderWorkshopInfo(); persistAll(); }
function saveWorkshopLocation() { renderWorkshopInfo(); persistAll(); }

let saveTimer = null;
function persistAll() {
    localStorage.setItem('studentFaceDB', JSON.stringify(studentDB));
    localStorage.setItem('monthAttendanceDB', JSON.stringify(monthAttendanceDB));
    localStorage.setItem('adminFaceDB', JSON.stringify(adminFaceDB));
    localStorage.setItem('workshopLocation', JSON.stringify(workshopLocation));
    if (USE_CLOUD_DB) {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(() => writeToCloud(), 1000);
    }
}

// ====================== 学生人脸库渲染 ======================
function renderStudentList() {
    const total = studentDB.length;
    studentCountDom.innerText = "(" + total + "/" + MAX_STUDENT + ")";
    if (total === 0) { studentListDom.innerHTML = '<span class="text-gray-400">暂无录入学生</span>'; return; }
    let html = "";
    studentDB.forEach((item, idx) => {
        html += '<div class="py-1.5 border-b border-gray-100 flex justify-between items-center"><span>' + (idx+1) + ". " + item.name + '</span><button data-del="' + idx + '" class="text-red-400 hover:text-red-600 del-stu text-xs">删除</button></div>';
    });
    studentListDom.innerHTML = html;
    document.querySelectorAll('.del-stu').forEach(el => {
        el.onclick = () => { studentDB.splice(Number(el.dataset.del), 1); saveStudentDB(); };
    });
}

function renderMonthSelect() {
    const months = Object.keys(monthAttendanceDB).sort().reverse();
    monthSelectDom.innerHTML = "";
    if (months.length === 0) {
        monthSelectDom.innerHTML = '<option value="">暂无考勤数据</option>';
        monthRecordDom.innerHTML = '<span class="text-gray-400">暂无月度考勤记录</span>';
        return;
    }
    months.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.innerText = m; monthSelectDom.appendChild(opt); });
    monthSelectDom.value = months[0];
    renderMonthRecord(months[0]);
}
monthSelectDom.onchange = () => renderMonthRecord(monthSelectDom.value);

function renderMonthRecord(month) {
    const list = monthAttendanceDB[month] || [];
    if (list.length === 0) { monthRecordDom.innerHTML = '<span class="text-gray-400">该月份无考勤数据</span>'; return; }
    let html = "";
    list.forEach(item => {
        const tagMap = { normal: ['tag-normal','正常'], late: ['tag-late','迟到'], absent: ['tag-absent','缺勤'] };
        const [cls, txt] = tagMap[item.status] || ['', item.status];
        html += '<div class="py-2 border-b border-gray-100"><div class="font-medium">' + item.name + '</div><div class="' + cls + '">' + txt + '</div><div class="text-xs text-gray-400">日期：' + item.date + ' | 时间：' + (item.signTime||'无') + '</div></div>';
    });
    monthRecordDom.innerHTML = html;
}

function renderWorkshopInfo() {
    const adminText = adminFaceDB ? "已录入管理员人脸" : "未录入管理员人脸";
    if (!workshopLocation) { workshopInfoDom.innerHTML = '<div>管理员：' + adminText + '</div><div>签到地点：尚未设置</div>'; return; }
    workshopInfoDom.innerHTML = '<div>管理员：' + adminText + '</div><div>地点：' + workshopLocation.name + '</div><div>范围：' + workshopLocation.radius + '米内有效</div><div class="text-xs text-gray-400">经纬度：' + workshopLocation.lat.toFixed(6) + ', ' + workshopLocation.lng.toFixed(6) + '</div>';
}

// ====================== 签到时间规则 ======================
function getTodaySignRule(now) { if (!now) now = new Date(); const wd = now.getDay(); if (wd === 0) return null; if (wd === 6) return SIGN_RULES.saturday; return SIGN_RULES.weekday; }
function isLateByRule(now, rule) { return now.getHours() > rule.hour || (now.getHours() === rule.hour && now.getMinutes() > rule.minute); }
function formatSignRule(rule) { return rule.label + "前签到为正常"; }
function getTodayDateStr() { const n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0'); }
function getCurrentMonthKey() { const n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0'); }

// ====================== 人脸模型加载 ======================
async function loadFaceModel() {
    let dotCount = 0;
    const dotTimer = setInterval(() => { dotCount = (dotCount+1)%4; statusTip.innerText = "正在加载AI模型" + ".".repeat(dotCount||1) + " 首次约需1-3分钟"; }, 600);
    for (const url of MODEL_URLS) {
        try {
            currentModelUrl = url;
            await faceapi.nets.ssdMobilenetv1.loadFromUri(url);
            await faceapi.nets.faceLandmark68Net.loadFromUri(url);
            await faceapi.nets.faceRecognitionNet.loadFromUri(url);
            clearInterval(dotTimer);
            modelLoaded = true;
            [btnStartCamera, btnStopCamera, btnRegister, btnCheckIn, btnCalcAbsent, btnRegisterAdmin, btnUpdateWorkshop].forEach(b => b.disabled = false);
            btnStopCamera.disabled = true;
            statusTip.innerText = "✅ AI模型加载完成，可以开启摄像头使用";
            statusTip.style.color = "#059669";
            statusTip.classList.remove('loading-anim');
            return;
        } catch (err) { console.warn("源 " + url + " 加载失败:", err.message); }
    }
    clearInterval(dotTimer);
    statusTip.innerText = "❌ 模型加载失败，请检查网络后刷新重试";
    statusTip.style.color = "#dc2626";
    statusTip.classList.remove('loading-anim');
}

// ====================== 摄像头控制 ======================
async function openCamera() {
    if (!modelLoaded) return alert("模型未加载完成！");
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
        videoDom.srcObject = mediaStream;
        videoDom.onloadedmetadata = () => { canvasDom.width = videoDom.videoWidth; canvasDom.height = videoDom.videoHeight; startDetectLoop(); };
        btnStartCamera.disabled = true; btnStopCamera.disabled = false;
        statusTip.innerText = "摄像头已开启，实时识别人脸中...";
        statusTip.style.color = "#059669";
    } catch (err) { statusTip.innerText = "❌ 摄像头开启失败"; statusTip.style.color = "#dc2626"; }
}

function closeCamera() {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null; videoDom.srcObject = null;
    if (detectTimer) cancelAnimationFrame(detectTimer);
    detectTimer = null; ctx.clearRect(0, 0, canvasDom.width, canvasDom.height);
    previewCanvas.style.display = 'none'; pendingRegistration = false;
    btnStartCamera.disabled = false; btnStopCamera.disabled = true;
    inputWrap.classList.add('hidden');
    statusTip.innerText = "摄像头已关闭"; statusTip.style.color = "#6b7280";
}

function selectBestFace(faces) {
    const frameArea = videoDom.videoWidth * videoDom.videoHeight;
    const valid = faces.filter(f => (f.detection.box.width * f.detection.box.height) > frameArea * 0.05);
    if (valid.length === 0) return null;
    valid.sort((a, b) => (b.detection.box.width * b.detection.box.height) - (a.detection.box.width * a.detection.box.height));
    return valid[0];
}

function startDetectLoop() {
    async function detectFrame() {
        if (!mediaStream) return;
        try {
            const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.7 })).withFaceLandmarks().withFaceDescriptors();
            ctx.clearRect(0, 0, canvasDom.width, canvasDom.height);
            const ds = { width: canvasDom.width, height: canvasDom.height };
            const resized = faceapi.resizeResults(faces, ds);
            faceapi.draw.drawDetections(canvasDom, resized);
            faceapi.draw.drawFaceLandmarks(canvasDom, resized);
            if (resized.length > 0) {
                const best = selectBestFace(resized);
                if (best) {
                    const b = best.detection.box;
                    ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 3;
                    ctx.strokeRect(b.x, b.y, b.width, b.height);
                    ctx.fillStyle = '#00ff00'; ctx.font = '16px sans-serif';
                    ctx.fillText("← 目标人脸", b.x, b.y - 6);
                }
                if (pendingRegistration && best) showFacePreview(best);
            }
        } catch (e) { }
        detectTimer = requestAnimationFrame(detectFrame);
    }
    detectFrame();
}

function showFacePreview(det) {
    const b = det.detection.box, sc = 200 / Math.max(b.width, b.height), w = b.width*sc, h = b.height*sc;
    previewCanvas.width = 200; previewCanvas.height = 200;
    previewCtx.fillStyle = '#000'; previewCtx.fillRect(0, 0, 200, 200);
    previewCtx.drawImage(videoDom, b.x, b.y, b.width, b.height, (200-w)/2, (200-h)/2, w, h);
    previewCanvas.style.display = 'block';
}

// ====================== 录入学生人脸 ======================
btnRegister.onclick = () => {
    if (!mediaStream) return alert("请先开启摄像头！");
    pendingRegistration = true; inputWrap.classList.remove('hidden');
    studentNameInput.value = ''; studentNameInput.focus();
    statusTip.innerText = "请正对摄像头，输入姓名后点击【确认录入】"; statusTip.style.color = "#2563eb";
};
studentNameInput.onkeydown = e => { if (e.key === 'Enter') doRegister(); };
btnConfirmRegister.onclick = doRegister;

async function doRegister() {
    const name = studentNameInput.value.trim();
    if (!name) return alert("请先输入学生姓名！");
    if (studentDB.length >= MAX_STUDENT) return alert("已达最大录入人数" + MAX_STUDENT + "！");
    statusTip.innerText = "正在采集人脸特征，请保持不动..."; statusTip.style.color = "#2563eb";
    try {
        const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.7 })).withFaceLandmarks().withFaceDescriptors();
        if (faces.length === 0) { statusTip.innerText = "❌ 未检测到人脸！"; statusTip.style.color = "#dc2626"; return; }
        const tf = selectBestFace(faces);
        if (!tf) { statusTip.innerText = "❌ 人脸太小，请靠近摄像头"; statusTip.style.color = "#dc2626"; return; }
        studentDB.push({ name: name, descriptor: Array.from(tf.descriptor), registeredAt: new Date().toISOString() });
        saveStudentDB();
        pendingRegistration = false; inputWrap.classList.add('hidden'); previewCanvas.style.display = 'none';
        statusTip.innerText = "✅ 学生【" + name + "】录入成功！当前共" + studentDB.length + "人";
        statusTip.style.color = "#059669";
        alert("学生【" + name + "】录入成功！\n当前人脸库：" + studentDB.length + "人");
    } catch (err) { statusTip.innerText = "❌ 录入失败：" + err.message; statusTip.style.color = "#dc2626"; }
}

// ====================== 管理员权限与定位 ======================
function getCurrentPositionPromise() { return new Promise((res, rej) => { if (!navigator.geolocation) return rej(new Error("不支持定位")); navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }); }); }
function calcDistanceMeters(lat1, lng1, lat2, lng2) { const R=6371000, toRad=d=>d*Math.PI/180, dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1), a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }

async function captureBestFaceDescriptor(tip) {
    if (!mediaStream) { alert("请先开启摄像头！"); return null; }
    statusTip.innerText = tip || "正在采集人脸..."; statusTip.style.color = "#2563eb";
    const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.7 })).withFaceLandmarks().withFaceDescriptors();
    if (faces.length === 0) { statusTip.innerText = "❌ 未检测到人脸"; statusTip.style.color = "#dc2626"; return null; }
    const tf = selectBestFace(faces);
    if (!tf) { statusTip.innerText = "❌ 人脸太小"; statusTip.style.color = "#dc2626"; return null; }
    return tf.descriptor;
}

async function verifyAdminFace() {
    if (!adminFaceDB || !adminFaceDB.descriptor) { alert("尚未录入管理员人脸！"); return false; }
    const cd = await captureBestFaceDescriptor("正在验证管理员人脸...");
    if (!cd) return false;
    const dist = faceapi.euclideanDistance(cd, new Float32Array(adminFaceDB.descriptor));
    if (dist >= ADMIN_FACE_THRESHOLD) { statusTip.innerText = "❌ 管理员验证失败"; statusTip.style.color = "#dc2626"; alert("管理员人脸识别失败！"); return false; }
    statusTip.innerText = "✅ 管理员验证成功"; statusTip.style.color = "#059669"; return true;
}

async function registerAdminFace() {
    try {
        if (adminFaceDB) { const ok = await verifyAdminFace(); if (!ok) return; if (!confirm("确认更换管理员人脸？")) return; }
        else if (!confirm("确认录入管理员人脸？")) return;
        const desc = await captureBestFaceDescriptor("正在录入管理员人脸...");
        if (!desc) return;
        adminFaceDB = { descriptor: Array.from(desc), registeredAt: new Date().toISOString() };
        saveAdminDB(); statusTip.innerText = "✅ 管理员录入成功"; statusTip.style.color = "#059669";
        alert("管理员人脸录入成功！");
    } catch (err) { statusTip.innerText = "❌ 录入失败"; statusTip.style.color = "#dc2626"; }
}

async function updateWorkshopLocation() {
    try {
        const ok = await verifyAdminFace(); if (!ok) return;
        statusTip.innerText = "正在获取位置..."; statusTip.style.color = "#2563eb";
        const pos = await getCurrentPositionPromise();
        const dn = workshopLocation ? workshopLocation.name : "我的工作坊";
        const name = (prompt("输入签到地点名称：", dn) || dn).trim();
        const r = prompt("输入有效范围（米）：", workshopLocation ? workshopLocation.radius : DEFAULT_WORKSHOP_RADIUS);
        const radius = Number(r);
        if (!Number.isFinite(radius) || radius <= 0) { alert("范围必须是大于0的数字！"); return; }
        workshopLocation = { name, lat: pos.coords.latitude, lng: pos.coords.longitude, radius: Math.round(radius), updatedAt: new Date().toISOString() };
        saveWorkshopLocation();
        statusTip.innerText = "✅ 地点已更新"; statusTip.style.color = "#059669";
        alert("签到地点修改成功！\n" + name + "，" + radius + "米内有效");
    } catch (err) { alert("定位失败：" + err.message); }
}

async function checkWorkshopLocation() {
    if (!workshopLocation) { alert("尚未设置签到地点！"); return false; }
    try {
        statusTip.innerText = "正在检测位置..."; statusTip.style.color = "#2563eb";
        const pos = await getCurrentPositionPromise();
        const dist = calcDistanceMeters(pos.coords.latitude, pos.coords.longitude, workshopLocation.lat, workshopLocation.lng);
        if (dist > workshopLocation.radius) { statusTip.innerText = "❌ 不在签到范围内"; statusTip.style.color = "#dc2626"; alert("未到达指定区域！"); return false; }
        statusTip.innerText = "✅ 已在签到范围内"; statusTip.style.color = "#059669"; return true;
    } catch (err) { alert("定位失败"); return false; }
}

// ====================== 签到核心逻辑 ======================
btnCheckIn.onclick = faceSignIn;
async function faceSignIn() {
    const rule = getTodaySignRule();
    if (!rule) { statusTip.innerText = "今天周日休息"; alert("今天周日休息！"); return; }
    if (!mediaStream) return alert("请先开启摄像头！");
    if (!await checkWorkshopLocation()) return;
    statusTip.innerText = "正在识别人脸..."; statusTip.style.color = "#2563eb";
    const faces = await faceapi.detectAllFaces(videoDom, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.7 })).withFaceLandmarks().withFaceDescriptors();
    if (faces.length === 0) { statusTip.innerText = "❌ 未检测到人脸"; statusTip.style.color = "#dc2626"; return; }
    const tf = selectBestFace(faces);
    if (!tf) { statusTip.innerText = "❌ 人脸太小"; statusTip.style.color = "#dc2626"; return; }
    let matchStu = null, bestDist = Infinity;
    for (const s of studentDB) { const d = faceapi.euclideanDistance(tf.descriptor, new Float32Array(s.descriptor)); if (d < bestDist) { bestDist = d; matchStu = s; } }
    if (!matchStu || bestDist >= FACE_THRESHOLD) { statusTip.innerText = "❌ 未匹配（" + bestDist.toFixed(3) + "）"; statusTip.style.color = "#dc2626"; alert("人脸未匹配到学生库！"); return; }
    const now = new Date(), dateStr = getTodayDateStr(), monthKey = getCurrentMonthKey();
    const sr = getTodaySignRule(now);
    if (!sr) return;
    let st = isLateByRule(now, sr) ? 'late' : 'normal';
    if (!monthAttendanceDB[monthKey]) monthAttendanceDB[monthKey] = [];
    monthAttendanceDB[monthKey] = monthAttendanceDB[monthKey].filter(i => !(i.name === matchStu.name && i.date === dateStr));
    monthAttendanceDB[monthKey].push({ name: matchStu.name, date: dateStr, signTime: now.toLocaleString('zh-CN'), status: st });
    saveMonthDB(); renderMonthRecord(monthKey); renderTodayRecord(dateStr);
    statusTip.innerText = "✅ " + matchStu.name + (st === 'normal' ? " 正常签到" : " 迟到签到");
    statusTip.style.color = "#059669";
    alert("✅ " + matchStu.name + "\n" + (st === 'normal' ? "正常" : "迟到"));
}

function renderTodayRecord(td) {
    const mk = getCurrentMonthKey();
    const list = (monthAttendanceDB[mk]||[]).filter(i => i.date === td);
    if (list.length === 0) { todayRecordDom.innerHTML = '<span class="text-gray-400">暂无签到</span>'; return; }
    todayRecordDom.innerHTML = list.map(i => '<div class="py-1.5 border-b flex justify-between items-center"><span>'+i.name+'</span><span class="'+(i.status==='normal'?'tag-normal':'tag-late')+'">'+(i.status==='normal'?'正常':'迟到')+'</span><span class="text-xs text-gray-400">'+i.signTime+'</span></div>').join('');
}

// ====================== 统计缺勤 ======================
btnCalcAbsent.onclick = calcAbsentStudent;
function calcAbsentStudent() {
    if (studentDB.length === 0) return alert("人脸库为空！");
    const rule = getTodaySignRule();
    if (!rule) { absentListDom.innerHTML = '<span class="tag-normal">周日休息</span>'; return; }
    const ds = getTodayDateStr(), mk = getCurrentMonthKey();
    const ml = monthAttendanceDB[mk]||[];
    const sn = ml.filter(i => i.date === ds).map(i => i.name);
    const abs = studentDB.filter(s => !sn.includes(s.name));
    if (abs.length === 0) { absentListDom.innerHTML = '<span class="tag-normal">全员签到</span>'; return; }
    abs.forEach(s => { if (!ml.some(i => i.name === s.name && i.date === ds)) monthAttendanceDB[mk].push({ name: s.name, date: ds, signTime: null, status: 'absent' }); });
    saveMonthDB(); renderMonthRecord(mk);
    absentListDom.innerHTML = abs.map(s => '<div class="py-1.5 border-b">'+s.name+'（缺勤）</div>').join('');
}

// ====================== 清空按钮事件 ======================
btnClearStudent.onclick = () => { if (confirm("确认清空所有人脸？")) { studentDB = []; saveStudentDB(); } };
btnClearToday.onclick = () => { const ds = getTodayDateStr(), mk = getCurrentMonthKey(); if (confirm("清空今日签到记录？")) { monthAttendanceDB[mk] = (monthAttendanceDB[mk]||[]).filter(i => i.date !== ds); saveMonthDB(); renderTodayRecord(ds); absentListDom.innerHTML = "点击【统计今日缺勤】生成名单"; } };
btnClearMonth.onclick = () => { const m = monthSelectDom.value; if (!m) return; if (confirm("清空" + m + "整月考勤？")) { delete monthAttendanceDB[m]; saveMonthDB(); } };

// 按钮绑定
btnStartCamera.onclick = openCamera;
btnStopCamera.onclick = closeCamera;
btnRegisterAdmin.onclick = registerAdminFace;
btnUpdateWorkshop.onclick = updateWorkshopLocation;

// 页面初始化加载
window.onload = async () => {
    await loadData();
    renderStudentList(); renderMonthSelect(); renderWorkshopInfo();
    await loadFaceModel();
};
window.onbeforeunload = () => closeCamera();
</script>
