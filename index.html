<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工作坊人脸识别考勤签到系统（云端共享）</title>
    <!-- 本地静态CDN替换国外face-api -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 国内jsdelivr镜像face-api，国内高速 -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        html, body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
        }

        #video-box {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            background: #000;
        }

        #face-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #camera-video {
            width: 100%;
            height: auto;
            display: block;
        }

        .scroll-wrap {
            max-height: 220px;
            overflow-y: auto;
        }

        .tag-normal { color: #059669; font-weight: 600; }
        .tag-late { color: #d97706; font-weight: 600; }
        .tag-absent { color: #dc2626; font-weight: 600; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-blue { background: #3b82f6; color: white; }
        .btn-blue:hover:not(:disabled) { background: #2563eb; }
        .btn-gray { background: #9ca3af; color: white; }
        .btn-gray:hover:not(:disabled) { background: #6b7280; }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover:not(:disabled) { background: #059669; }
        .btn-orange { background: #f97316; color: white; }
        .btn-orange:hover:not(:disabled) { background: #ea580c; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-purple:hover:not(:disabled) { background: #7c3aed; }
        .btn-red { background: #ef4444; color: white; }
        .btn-red:hover:not(:disabled) { background: #dc2626; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .loading-anim {
            animation: pulse 1.5s infinite;
        }

        #preview-canvas {
            display: none;
            border-radius: 8px;
            margin-top: 8px;
            border: 2px solid #10b981;
        }
    </style>
</head>
<body class="p-3 md:p-6">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-600">AI工作坊人脸识别考勤签到系统（云端共享）</h1>
            <p class="text-gray-500 mt-2 text-sm">周一至周五7:15前签到为正常 | 周六8:30前签到为正常 | 周日休息不签到 | 超时记迟到 | 未签到记缺勤</p>
            <p class="text-green-500 text-sm mt-1">云端数据，所有人打开页面同步查看全部签到记录</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
            <!-- 左列：摄像头模块 -->
            <div class="card">
                <div class="card-title">
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
                    实时人脸采集
                </div>
                <div id="video-box">
                    <video id="camera-video" autoplay muted playsinline></video>
                    <canvas id="face-canvas"></canvas>
                </div>
                <canvas id="preview-canvas" width="200" height="200"></canvas>

                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button id="open-cam" class="btn btn-blue w-full" disabled>开启摄像头</button>
                    <button id="register-face" class="btn btn-green w-full" disabled>录入学生人脸</button>
                    <button id="check-sign" class="btn btn-orange w-full" disabled>今日签到（点击后开始识别人脸）</button>
                    <button id="stat-absent" class="btn btn-red w-full" disabled>统计今日缺勤</button>
                </div>
                <button id="close-cam" class="btn btn-gray w-full mt-3" disabled>关闭摄像头</button>

                <div class="mt-3 hidden" id="input-wrap">
                    <label class="block text-sm font-medium mb-1">输入学生姓名：</label>
                    <div class="flex gap-2">
                        <input type="text" id="stu-name" placeholder="请输入姓名" class="flex-1 border rounded-lg px-3 py-2 text-sm">
                        <button id="confirm-reg" class="btn btn-green text-sm">确认录入</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">请正对摄像头，光线充足再录入</p>
                </div>

                <p id="status-tip" class="mt-4 text-sm text-gray-500 loading-anim">正在加载AI模型...</p>
            </div>

            <!-- 中列：人脸库 + 今日签到 -->
            <div class="flex flex-col gap-5">
                <div class="card">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="card-title m-0 p-0">云端学生人脸库 <span id="stu-count" class="text-sm text-gray-400">(0/20)</span></h3>
                        <button id="clear-all-stu" class="text-xs text-red-500 hover:underline">清空全部</button>
                    </div>
                    <div id="stu-list" class="scroll-wrap text-sm text-gray-500">加载云端人脸中...</div>
                </div>
                <div class="card flex-1">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="card-title m-0 p-0">今日云端签到记录</h3>
                        <button id="clear-today-sign" class="text-xs text-red-500 hover:underline">清空今日记录</button>
                    </div>
                    <div id="today-sign-list" class="scroll-wrap text-sm">同步云端数据...</div>
                </div>
            </div>

            <!-- 右列：配置 + 月度统计 -->
            <div class="flex flex-col gap-5">
                <div class="card">
                    <h3 class="card-title">工作坊签到范围配置</h3>
                    <div id="cfg-text" class="text-sm text-gray-500 leading-6">加载配置中...</div>
                    <div class="grid grid-cols-2 gap-2 mt-3">
                        <button id="reg-admin" class="btn btn-purple w-full" disabled>录入/更换管理员人脸</button>
                        <button id="edit-range" class="btn btn-blue w-full" disabled>修改签到地点（管理员验证）</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 text-gray-400">修改地点前必须通过管理员人脸识别，签到校验GPS距离</p>
                </div>
                <div class="card flex-1">
                    <h3 class="card-title">月度云端考勤汇总</h3>
                    <select id="month-select" class="w-full border rounded px-3 py-2 text-sm mb-3"></select>
                    <div id="month-data" class="scroll-wrap text-sm">加载月度数据...</div>
                    <button id="clear-month" class="btn btn-red w-full mt-3 text-sm">清空当前月份全部考勤</button>
                </div>
            </div>
        </div>
    </div>

<script>
// 已填入你的Supabase信息
const SUPABASE_URL = "https://aldubipgjeqevqwspblm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tm-k2icbPkF2A2tSfPCiWA_pe8MWMjT";
const { createClient } = supabase;
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MAX_STU = 20;
const FACE_THRESHOLD = 0.45;
const ADMIN_THRESHOLD = 0.5;
const MODEL_PATH = "https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models";

// DOM
const video = document.getElementById("camera-video");
const faceCanvas = document.getElementById("face-canvas");
const previewCanvas = document.getElementById("preview-canvas");
const previewCtx = previewCanvas.getContext("2d");
const ctx = faceCanvas.getContext("2d");

const openCamBtn = document.getElementById("open-cam");
const closeCamBtn = document.getElementById("close-cam");
const regFaceBtn = document.getElementById("register-face");
const confirmRegBtn = document.getElementById("confirm-reg");
const checkSignBtn = document.getElementById("check-sign");
const statAbsentBtn = document.getElementById("stat-absent");
const regAdminBtn = document.getElementById("reg-admin");
const editRangeBtn = document.getElementById("edit-range");

const inputWrap = document.getElementById("input-wrap");
const stuNameInput = document.getElementById("stu-name");
const statusTip = document.getElementById("status-tip");

const stuListDom = document.getElementById("stu-list");
const stuCountDom = document.getElementById("stu-count");
const todaySignDom = document.getElementById("today-sign-list");
const monthSelectDom = document.getElementById("month-select");
const monthDataDom = document.getElementById("month-data");
const cfgTextDom = document.getElementById("cfg-text");

const clearAllStuBtn = document.getElementById("clear-all-stu");
const clearTodayBtn = document.getElementById("clear-today-sign");
const clearMonthBtn = document.getElementById("clear-month");

// 全局变量
let modelLoaded = false;
let mediaStream = null;
let drawAnim = null;
let allStudent = [];
let adminFace = null;
let workConfig = null;
let captureFaceDesc = null;

// 初始化加载模型
async function loadFaceModel() {
    try {
        statusTip.textContent = "正在加载人脸检测模型...";
        await faceapi.loadSsdMobilenetv1Model(MODEL_PATH);
        statusTip.textContent = "正在加载人脸关键点模型...";
        await faceapi.loadFaceLandmarkModel(MODEL_PATH);
        statusTip.textContent = "正在加载人脸特征提取模型...";
        await faceapi.loadFaceRecognitionModel(MODEL_PATH);
        modelLoaded = true;
        statusTip.textContent = "✅ AI模型加载完成，可开启摄像头";
        statusTip.classList.remove("loading-anim");
        openCamBtn.disabled = false;
        regAdminBtn.disabled = false;
        editRangeBtn.disabled = false;
        await loadCloudAllData();
    } catch (err) {
        statusTip.textContent = "❌ AI模型加载失败，请刷新页面或切换网络";
        console.error("模型加载错误：", err);
    }
}

// 加载云端全部数据
async function loadCloudAllData() {
    await loadStudentList();
    await loadAdminFace();
    await loadWorkConfig();
    await renderMonthSelect();
    await refreshTodaySign();
}

// 加载学生人脸库
async function loadStudentList() {
    const { data, error } = await supabase.from("student_face").select("*").order("registered_at");
    if (error) return alert("读取人脸库失败：" + error.message);
    allStudent = data;
    stuCountDom.textContent = `(${allStudent.length}/${MAX_STU})`;
    if (allStudent.length === 0) {
        stuListDom.innerHTML = "<div class='text-gray-400'>暂无录入学生人脸</div>";
        return;
    }
    let html = "";
    allStudent.forEach(item => {
        html += `
        <div class="flex justify-between py-1 border-b border-gray-100">
            <span>${item.name}</span>
            <button data-id="${item.id}" class="del-stu text-red-500 text-xs">删除</button>
        </div>`;
    });
    stuListDom.innerHTML = html;
    // 删除绑定
    document.querySelectorAll(".del-stu").forEach(el => {
        el.onclick = async () => {
            const delId = el.dataset.id;
            if (!confirm("确定删除该学生人脸？")) return;
            await supabase.from("student_face").delete().eq("id", delId);
            await loadStudentList();
        };
    });
}

// 加载管理员人脸
async function loadAdminFace() {
    const { data } = await supabase.from("admin_face").select("*").limit(1);
    adminFace = data.length ? data[0].descriptor : null;
}

// 加载签到配置
async function loadWorkConfig() {
    const { data } = await supabase.from("workshop_config").select("*").eq("id", 1).limit(1);
    if (!data.length) {
        cfgTextDom.innerHTML = "未设置签到地点，点击修改配置录入地址与范围";
        workConfig = null;
        return;
    }
    workConfig = data[0];
    cfgTextDom.innerHTML = `
    <div>地点名称：${workConfig.name}</div>
    <div>签到有效范围：${workConfig.radius}米</div>
    <div>定位坐标：${workConfig.lat}, ${workConfig.lng}</div>
    `;
}

// 刷新今日签到记录
async function refreshTodaySign() {
    const today = new Date().toISOString().split("T")[0];
    const { data } = await supabase.from("attendance").select("*").eq("date", today).order("sign_time");
    if (!data.length) {
        todaySignDom.innerHTML = "<div class='text-gray-400'>今日暂无签到记录</div>";
        return;
    }
    let html = "";
    data.forEach(item => {
        let tagClass = "tag-normal";
        let tagTxt = "正常";
        if (item.status === "late") { tagClass = "tag-late"; tagTxt = "迟到"; }
        if (item.status === "absent") { tagClass = "tag-absent"; tagTxt = "缺勤"; }
        html += `<div class="py-1 border-b border-gray-100">${item.name} <span class="${tagClass}">${tagTxt}</span> ${item.sign_time || "无签到时间"}</div>`;
    });
    todaySignDom.innerHTML = html;
}

// 渲染月份下拉
function renderMonthSelect() {
    const now = new Date();
    let html = "";
    for (let i = 0; i < 6; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        html += `<option value="${val}">${val}</option>`;
    }
    monthSelectDom.innerHTML = html;
    loadMonthData();
}

async function loadMonthData() {
    const month = monthSelectDom.value;
    const start = `${month}-01`;
    const nextM = Number(month.split("-")[1]) + 1;
    const end = nextM > 12 ? `${Number(month.split("-")[0]) + 1}-01-01` : `${month.split("-")[0]}-${String(nextM).padStart(2, "0")}-01`;
    const { data } = await supabase.from("attendance").select("*").gte("date", start).lt("date", end).order("date");
    if (!data.length) {
        monthDataDom.innerHTML = "<div class='text-gray-400'>该月份暂无考勤数据</div>";
        return;
    }
    let html = "";
    data.forEach(item => {
        let tagClass = "tag-normal";
        let tagTxt = "正常";
        if (item.status === "late") { tagClass = "tag-late"; tagTxt = "迟到"; }
        if (item.status === "absent") { tagClass = "tag-absent"; tagTxt = "缺勤"; }
        html += `<div class="py-1 border-b border-gray-100">${item.date} ${item.name} <span class="${tagClass}">${tagTxt}</span></div>`;
    });
    monthDataDom.innerHTML = html;
}

// 开启摄像头
async function openCamera() {
    if (!modelLoaded) return alert("AI模型尚未加载完成");
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: 640, height: 480 }, audio: false
        });
        video.srcObject = mediaStream;
        video.onloadedmetadata = () => {
            faceCanvas.width = video.videoWidth;
            faceCanvas.height = video.videoHeight;
            startDrawFrame();
        };
        openCamBtn.disabled = true;
        closeCamBtn.disabled = false;
        regFaceBtn.disabled = false;
        checkSignBtn.disabled = false;
        statAbsentBtn.disabled = false;
    } catch (err) {
        alert("摄像头权限被拒绝，请允许页面相机权限：" + err.message);
    }
}

// 循环绘制人脸框
function startDrawFrame() {
    if (drawAnim) cancelAnimationFrame(drawAnim);
    async function render() {
        ctx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
        const faceDetect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        if (faceDetect) {
            const box = faceDetect.detection.box;
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 3;
            ctx.strokeRect(box.x, box.y, box.width, box.height);
            captureFaceDesc = faceDetect.descriptor;
        } else {
            captureFaceDesc = null;
        }
        drawAnim = requestAnimationFrame(render);
    }
    render();
}

// 关闭摄像头
function closeCamera() {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
    video.srcObject = null;
    if (drawAnim) cancelAnimationFrame(drawAnim);
    ctx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
    openCamBtn.disabled = false;
    closeCamBtn.disabled = true;
    regFaceBtn.disabled = true;
    checkSignBtn.disabled = true;
    statAbsentBtn.disabled = true;
    inputWrap.classList.add("hidden");
    previewCanvas.style.display = "none";
    captureFaceDesc = null;
}

// 录入人脸弹窗
regFaceBtn.onclick = () => {
    if (!captureFaceDesc) return alert("未检测到人脸，请正对摄像头");
    inputWrap.classList.remove("hidden");
    previewCtx.drawImage(video, 0, 0, 200, 200);
    previewCanvas.style.display = "block";
    stuNameInput.value = "";
    stuNameInput.focus();
};

// 确认录入学生
confirmRegBtn.onclick = async () => {
    const name = stuNameInput.value.trim();
    if (!name) return alert("请输入学生姓名");
    if (allStudent.length >= MAX_STU) return alert("人脸库已达20人上限，请删除旧人脸再录入");
    const descArr = Array.from(captureFaceDesc);
    const { error } = await supabase.from("student_face").insert({ name, descriptor: descArr });
    if (error) return alert("录入失败：" + error.message);
    alert(`学生【${name}】人脸录入云端成功`);
    inputWrap.classList.add("hidden");
    previewCanvas.style.display = "none";
    await loadStudentList();
};

// 人脸签到
checkSignBtn.onclick = async () => {
    if (!workConfig) return alert("管理员未配置签到地点，无法签到");
    if (!captureFaceDesc) return alert("未识别到人脸");
    // GPS校验
    const getPos = () => new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 }));
    let pos;
    try { pos = await getPos(); } catch { return alert("获取定位失败，请允许定位权限"); }
    const dis = getDistance(pos.coords.latitude, pos.coords.longitude, workConfig.lat, workConfig.lng);
    if (dis > workConfig.radius) return alert(`超出签到范围${dis.toFixed(1)}米，当前仅允许${workConfig.radius}米内签到`);

    // 人脸比对
    let matchName = null;
    let minDis = 999;
    allStudent.forEach(item => {
        const dist = faceapi.euclideanDistance(captureFaceDesc, new Float32Array(item.descriptor));
        if (dist < FACE_THRESHOLD && dist < minDis) {
            minDis = dist;
            matchName = item.name;
        }
    });
    if (!matchName) return alert("未匹配到学生人脸，请重新采集");

    // 判断签到时间
    const now = new Date();
    const week = now.getDay();
    const today = now.toISOString().split("T")[0];
    const h = now.getHours();
    const m = now.getMinutes();
    let status = "normal";
    if (week === 0) return alert("周日休息，无需签到");
    if (week >= 1 && week <=5) {
        if (h >7 || (h ===7 && m>15)) status = "late";
    }
    if (week ===6) {
        if (h>8 || (h===8 && m>30)) status = "late";
    }
    const signTime = now.toLocaleString();
    // 判断今日是否已签到
    const { data: exist } = await supabase.from("attendance").select("id").eq("date", today).eq("name", matchName).limit(1);
    if (exist.length) return alert(`${matchName}今日已完成签到，无需重复提交`);
    await supabase.from("attendance").insert({ date: today, name: matchName, sign_time: signTime, status });
    alert(`${matchName}签到成功，状态：${status === "normal" ? "正常" : "迟到"}`);
    await refreshTodaySign();
};

// 计算两点距离
function getDistance(lat1, lon1, lat2, lon2) {
    const rad = Math.PI / 180;
    const R = 6371000;
    const dLat = (lat2 - lat1) * rad;
    const dLon = (lon2 - lon1) * rad;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 统计缺勤
statAbsentBtn.onclick = async () => {
    const today = new Date().toISOString().split("T")[0];
    const { data: signList } = await supabase.from("attendance").select("name").eq("date", today);
    const signedSet = new Set(signList.map(i => i.name));
    const absentList = allStudent.filter(s => !signedSet.has(s.name));
    if (!absentList.length) return alert("今日全员签到，无缺勤学生");
    let txt = "今日缺勤名单：\n";
    absentList.forEach(i => txt += i.name + "\n");
    if (!confirm(txt + "\n确认要将以上学生标记为缺勤写入云端？")) return;
    const now = new Date().toLocaleString();
    for (const s of absentList) {
        await supabase.from("attendance").insert({ date: today, name: s.name, sign_time: null, status: "absent" });
    }
    alert("缺勤记录已同步云端");
    await refreshTodaySign();
};

// 管理员人脸录入
regAdminBtn.onclick = async () => {
    if (!mediaStream) return alert("请先开启摄像头");
    if (!captureFaceDesc) return alert("未检测到人脸");
    if (adminFace) {
        const matchDis = faceapi.euclideanDistance(captureFaceDesc, new Float32Array(adminFace));
        if (matchDis > ADMIN_THRESHOLD) return alert("必须验证原有管理员人脸才能更换");
    }
    const descArr = Array.from(captureFaceDesc);
    await supabase.from("admin_face").delete().neq("id",0);
    await supabase.from("admin_face").insert({ descriptor: descArr });
    alert("管理员人脸录入/更换成功");
    await loadAdminFace();
};

// 修改签到地点
editRangeBtn.onclick = async () => {
    if (!mediaStream || !captureFaceDesc) return alert("开启摄像头并正对人脸验证管理员");
    if (!adminFace) return alert("未录入管理员人脸，先录入管理员");
    const dis = faceapi.euclideanDistance(captureFaceDesc, new Float32Array(adminFace));
    if (dis > ADMIN_THRESHOLD) return alert("管理员人脸验证失败，无法修改配置");
    const getPos = () => new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 }));
    let pos;
    try { pos = await getPos(); } catch { return alert("获取定位失败"); }
    const name = prompt("输入签到地点名称：", workConfig?.name || "工作坊");
    if (!name) return;
    const radius = Number(prompt("输入有效签到半径（米）：", workConfig?.radius || 100));
    if (isNaN(radius) || radius <=0) return alert("范围必须为正数");
    await supabase.from("workshop_config").upsert({
        id:1, name, lat: pos.coords.latitude, lng: pos.coords.longitude, radius
    });
    alert("签到配置更新成功");
    await loadWorkConfig();
};

// 清空按钮绑定
clearAllStuBtn.onclick = async () => {
    if (!confirm("确定删除云端全部学生人脸？无法恢复")) return;
    await supabase.from("student_face").delete().neq("id",0);
    await loadStudentList();
};
clearTodayBtn.onclick = async () => {
    const today = new Date().toISOString().split("T")[0];
    if (!confirm("清空今日所有签到记录？")) return;
    await supabase.from("attendance").delete().eq("date", today);
    await refreshTodaySign();
};
clearMonthBtn.onclick = async () => {
    const m = monthSelectDom.value;
    if (!confirm(`清空${m}整月考勤记录？`)) return;
    const start = `${m}-01`;
    const nextM = Number(m.split("-")[1]) + 1;
    const end = nextM >12 ? `${Number(m.split("-")[0])+1}-01-01` : `${m.split("-")[0]}-${String(nextM).padStart(2,"0")}-01`;
    await supabase.from("attendance").delete().gte("date", start).lt("date", end);
    loadMonthData();
};
monthSelectDom.onchange = loadMonthData;

openCamBtn.onclick = openCamera;
closeCamBtn.onclick = closeCamera;

// 页面加载启动
window.onload = loadFaceModel;
window.onbeforeunload = closeCamera;
</script>
</body>
</html>
